<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>video_idea_01 cover v2</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #030812;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", "SimHei", sans-serif;
    }
    .cover {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      color: #ffffff;
      background:
        radial-gradient(circle at 76% 18%, rgba(0, 210, 255, 0.34), transparent 31%),
        radial-gradient(circle at 86% 78%, rgba(255, 210, 66, 0.16), transparent 26%),
        linear-gradient(135deg, #04111f 0%, #061b30 48%, #020711 100%);

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(105, 232, 255, 0.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(105, 232, 255, 0.13) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.78;
    }
    .shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.38), rgba(0,0,0,0.08) 48%, rgba(0,0,0,0.28));
    }
    .beam {
      position: absolute;
      right: -120px;
      top: 230px;
      width: 1060px;
      height: 4px;
      background: linear-gradient(90deg, transparent, #37e4ff, #ffd447, transparent);
      transform: rotate(-13deg);
      box-shadow: 0 0 34px rgba(55, 228, 255, 0.72);
      opacity: 0.76;
    }
    .beam.second {
      top: 792px;
      right: 110px;
      width: 780px;
      transform: rotate(12deg);
      opacity: 0.46;
    }
    .particle {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #66eaff;
      box-shadow: 0 0 22px rgba(102, 234, 255, 0.95);
    }
    .p1 { left: 124px; top: 132px; }
    .p2 { left: 534px; top: 858px; width: 6px; height: 6px; }
    .p3 { left: 1490px; top: 118px; }
    .p4 { left: 1768px; top: 824px; width: 11px; height: 11px; background: #ffd447; }
    .left {
      position: absolute;
      left: 110px;
      top: 118px;
      width: 880px;
      z-index: 5;
    }
    .label {
      display: inline-block;
      padding: 14px 20px;
      color: #8df2ff;

      background: rgba(3, 20, 38, 0.76);
      font-size: 29px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 0 34px rgba(55, 228, 255, 0.2);

      line-height: 1.25;

    .panel {

      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(5, 26, 47, 0.92), rgba(3, 13, 28, 0.86));
      box-shadow: 0 34px 86px rgba(0, 0, 0, 0.5), 0 0 72px rgba(55, 228, 255, 0.18);

    .panel-head {
      height: 86px;
      display: flex;
      align-items: center;

      color: #89f0ff;
      font-size: 27px;
      font-weight: 950;

    .dots {

      margin-right: 20px;
    }
    .dots i {
      display: block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffd447;
    }
    .dots i:nth-child(2) { background: #60e8ff; }
    .dots i:nth-child(3) { background: #55ff9c; }
    .node-wrap {
      position: absolute;
      left: 54px;
      right: 54px;
      top: 132px;
      bottom: 70px;
    }
    .rail {
      position: absolute;
      left: 78px;
      top: 92px;
      width: 4px;
      height: 530px;
      background: linear-gradient(#60e8ff, #ffd447, #60e8ff);
      box-shadow: 0 0 22px rgba(96, 232, 255, 0.72);
      opacity: 0.6;
    }
    .node {
      position: relative;
      height: 105px;
      margin-bottom: 28px;
      padding: 22px 24px 20px 94px;
      border: 1px solid rgba(105, 232, 255, 0.34);

    .num {

      left: 24px;
      top: 24px;
      width: 52px;

      color: #03101c;
      background: linear-gradient(135deg, #60e8ff, #ffd447);

      font-weight: 950;

    .node strong {
      display: block;
      color: #ffffff;
      font-size: 34px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;

    .node small {

      color: rgba(214, 247, 255, 0.76);

      font-weight: 800;

    .badge {

      bottom: 34px;
      padding: 14px 22px;
      color: #03101c;
      background: #ffd447;
      border-radius: 16px;
      font-size: 30px;
      font-weight: 950;
      box-shadow: 0 0 34px rgba(255, 212, 71, 0.42);
    }
